<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingresar - AutoDel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .brand span { color: #e94560; }
        .btn-accent { background: #e94560; color: white; border: none; width: 100%; padding: .6rem; }
        .btn-accent:hover { background: #ff6b6b; color: white; }
    </style>
</head>
<body>
<div class="auth-card">
    <h2 class="text-center fw-bold mb-1 brand">Auto<span>Del</span></h2>
    <p class="text-center text-muted mb-4">Ingresá a tu cuenta</p>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-danger">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
            <label class="form-label fw-500">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.as_text }}</div>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-accent mt-2">Ingresar</button>
    </form>
    <p class="text-center mt-3 small">¿No tenés cuenta? <a href="/registro/" style="color:#e94560">Registrate</a></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
