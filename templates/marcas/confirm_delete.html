{% extends 'base.html' %}
{% block title %}Eliminar {{ tipo }} - AutoDel{% endblock %}
{% block content %}
<div style="display:flex;justify-content:center;margin-top:2rem">
    <div class="confirm-card">
        <div class="icon">⚠️</div>
        <h2>Eliminar {{ tipo }}</h2>
        <p>¿Estás seguro que querés eliminar <strong>{{ objeto }}</strong>? Esta acción no se puede deshacer.</p>
        <form method="post" style="display:flex;gap:1rem;justify-content:center">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
            <a href="{% url 'marca_list' %}" class="btn btn-outline">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
